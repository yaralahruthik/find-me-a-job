# Per-application overlay — the honest way to keep a different resume per job.
#
# Real overlays live at data/out/<entry-id>/tailor.yaml (gitignored), where
# <entry-id> matches a row id in data/pipeline.yaml. A legacy config/tailor/<entry-id>.yaml
# is still read as a fallback, so overlays authored the old way keep working. Then:
#
#   node scripts/resume.mjs build --for <entry-id>
#     → data/out/<entry-id>/<your-name>.html   (add --pdf for a PDF)
#     (under output.layout: flat instead → data/out/resume-<entry-id>.html)
#
# An overlay may ONLY select, reorder, and re-headline the ONE audited master
# (config/resume.yaml). It cannot introduce a bullet — every id below must exist
# in the master. That is what makes per-JD fabrication impossible: there is still
# exactly one place any claim can live, and you have graded it.
#
# Every field is optional.
version: 1

role: fullstack                  # optional; a role preset from config/resume.yaml (headline + segments)
segment: product                 # which segment(s) to build; a string or list. Overrides role's set.
                                 #   e.g. segment: [product, backend]   (default: profile target_segment)
headline: "Frontend-leaning Product Engineer"   # override the headline for this JD (beats the role's)
summary: "…"                     # override the summary; or `false` to hide it entirely
date_granularity: year           # override the master's date style for THIS application: year | month
                                 #   (lets you A/B test a date format per job without touching the master)
max_pages: 1                     # override the page budget for THIS application (positive integer)
                                 #   build auto-trims the weakest non-pinned bullets to fit it; raise to 2
                                 #   for a senior role that earns two pages. --no-trim skips trimming entirely.

output:                          # optional; per-application override of the profile output default
  resume_filename: "{name}-{role}"   # A/B test the sent filename for THIS job. Tokens: {name}, {role}, {company}.
                                 #   (layout is a profile-level choice and cannot be overridden here)

pin:     [public-api, de-users]  # master bullet ids to float to the top of their section
drop:    [perf-replatform]       # master bullet ids to hide for this application
include: [analytics-product]     # force-include a bullet even if its segments exclude it
                                 #   (this is also how an `archive`-tagged master bullet is resurrected for one JD)
