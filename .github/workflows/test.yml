name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # playwright does not download browsers at install time, and the test
      # suite never renders a PDF, so npm ci is all the setup CI needs.
      - run: npm ci
      - run: npm test
